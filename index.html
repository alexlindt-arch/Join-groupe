<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="./assets/icons/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="./assets/icons/favicon/favicon.svg" />
    <link rel="shortcut icon" href="./assets/icons/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/icons/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="./assets/icons/favicon/site.webmanifest" />
    <link rel="stylesheet" href="style.css" />
    <title>Login</title>
</head>

<body class="login-page">
    <div class="login-logo-animated">
        <img src="./assets/img/logo_white.svg" class="logo-white" alt="Join Logo">
        <img src="./assets/img/logo_big.svg" class="logo-dark" alt="Join Logo">
    </div>

    <div class="login-fullscreen">
        <div class="login-topbar">
            <div id="signup_btn">
                <span>Not a Join user?</span>
                <button class="btn btn-primary" onclick="switchForm('login_section', 'registration_section')">
                    Sign up
                </button>
            </div>
        </div>

        <div class="login-content">
            <div id="login_section" class="login-card">
                <h2>Log in</h2>
                <span class="login-divider"></span>

                <form class="login-form" onsubmit="login(); return false;">
                    <div class="input-container">
                        <input type="email" id="login_email" class="input-field" placeholder="E-Mail"
                            autocomplete="email" required>
                        <img src="./assets/icons/mail.svg" class="input-field-icon" alt="Mail-Icon">
                    </div>
                    <div class="input-container">
                        <input type="password" id="login_passwort" class="input-field" placeholder="Password"
                            autocomplete="current-password" required>
                        <img src="./assets/icons/lock.svg" class="input-field-icon" alt="Lock-Icon">
                    </div>
                    <div class="login-buttons">
                        <button type="submit" class="btn btn-primary">Log in</button>
                        <button type="button" class="btn btn-secondary" onclick="location.href='./html/summary.html'"> <!-- hier muss späterdie Funktion austauscht werden -->
                            Guest Log in
                        </button>
                    </div>
                </form>
            </div>

            <div id="registration_section" class="login-card d-none">
                <div class="login-headline-section">
                    <img class="login-back-arrow" src="./assets/icons/arrow-left-line.svg" alt="Back-Icon"
                        onclick="switchForm('registration_section', 'login_section')">
                    <h2>Sign up</h2>
                </div>
                <span class="login-divider"></span>

                <form class="login-form" onsubmit="register(); return false;">
                    <div class="input-container">
                        <input type="text" id="reg_name" class="input-field" placeholder="Name" autocomplete="name"
                            oninput="validateRegistrationForm()" required>
                        <img src="./assets/icons/person.svg" class="input-field-icon" alt="">
                    </div>
                    <div class="input-container">
                        <input type="email" id="reg_email" class="input-field" placeholder="E-Mail" autocomplete="email"
                            oninput="validateRegistrationForm()" required>
                        <img src="./assets/icons/mail.svg" class="input-field-icon" alt="">
                    </div>
                    <div class="input-container">
                        <input type="password" id="reg_passwort" class="input-field" placeholder="Password"
                            autocomplete="new-password" oninput="validateRegistrationForm()" required>
                        <img src="./assets/icons/lock.svg" class="input-field-icon" alt="">
                    </div>
                    <div class="input-container">
                        <input type="password" id="reg_password_confirm" class="input-field"
                            placeholder="Confirm Password" autocomplete="new-password"
                            oninput="validateRegistrationForm()" required>
                        <img src="./assets/icons/lock.svg" class="input-field-icon" alt="">
                    </div>
                    <span id="pw_match_hint" style="display:none; color:#ff4d4d; font-size:13px; margin-top:-8px;">Passwords don't match</span>
                    <div class="login-privacy-row">
                        <input type="checkbox" id="reg_datenschutz" onchange="validateRegistrationForm()">
                        <label for="reg_datenschutz">
                            I accept the
                            <a href="./html/privacy_policy.html" target="_blank">Privacy Policy</a>

                        </label>
                    </div>
                    <div class="login-buttons">
                        <button type="submit" id="reg_submit_btn" class="btn btn-primary" disabled>
                            Sign up
                        </button>
                    </div>
                </form>
            </div>

        </div>
        <footer class="login-footer">
            <ul>
                <li><a href="./html/privacy_policy.html">Privacy Policy</a></li>
                <li><a href="./html/legal_notice.html">Legal notice</a></li>
            </ul>
        </footer>

    </div>

    <div id="notification" class="notification d-none"></div>
    <script src="script.js"></script>
    <script src="./js/login.js"></script>

</body>

</html>
