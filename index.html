<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="./assets/icons/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="./assets/icons/favicon/favicon.svg" />
    <link rel="shortcut icon" href="./assets/icons/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/icons/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="./assets/icons/favicon/site.webmanifest" />

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./assets/css/startscreen.css">
    <title>Login</title>
</head>

<body>
    <div class="start-screen"></div>
    <img class="logo-start-screen" src="./assets/img/logo_big.svg" alt="Join Logo">
    <div class="signup-header">
        <div class="signup-section">
            <span class="signup-span">Not a Join user?</span>
            <button class="signup-button" onclick="">Sign up</button>
        </div>
    </div>

    <div class="login-section-div">
        <div class="login-section">
            <div class="header-section">
                <div class="header-login">Login</div>
                <div class="border-login"></div>
            </div>
            <form id="loginForm" onsubmit="">
                <div class="login-fields">
                    <div class="login-container">
                        <input type="email" id="email" autocomplete="off" class="input" placeholder="Email">
                        <img class="email-icon" src="./assets/icons/mail.svg">
                    </div>
                    <div class="message-box"></div>
                    <div class="login-container">
                        <input type="password" id="password" autocomplete="off" class="input" placeholder="Password">
                        <img class="email-icon" src="./assets/icons/lock.svg">
                    </div>
                    <div class="login-buttons">
                        <button type="submit" class="button-login">Log In</button>
                        <button type="button" class="button-guest" id="loginButton">Guest Log In</button>
                    </div>
            </form>
        </div>
    </div>

    <div class="policy">
        <span onclick="" class="privacy-policy">Privacy Policy</span>
        <span onclick="" class="legal-notice">Legal notice</span>
    </div>
</body>

<script src="script.js"></script>

</html>
