<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../assets/icons/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon/favicon.svg" />
    <link rel="shortcut icon" href="../assets/icons/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/icons/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="../assets/icons/favicon/site.webmanifest" />
    <link rel="stylesheet" href="../assets/css/fonts.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../assets/css/sign_up.css">
    <title>Sign Up</title>
</head>
<body>

    <div class="signup-header">
        <a href="../index.html">
            <img class="signup-logo" src="../assets/img/logo_big.svg" alt="Join Logo">
        </a>
        <div class="signup-section">
            <span class="signup-span">Already a Join user?</span>
            <a href="../index.html" class="signup-button">Log in</a>
        </div>
    </div>

    <div class="signup-section-div">
        <div class="signup-form-card">
            <div class="header-section">
                <div class="header-login">Sign up</div>
                <div class="border-login"></div>
            </div>

            <form id="signupForm" onsubmit="return false;">
                <div class="login-fields">

                    <div class="login-container">
                        <input type="text" id="signup-name" autocomplete="off" class="input" placeholder="Name">
                        <img class="email-icon" src="../assets/icons/person.svg" alt="">
                    </div>

                    <div class="login-container">
                        <input type="email" id="signup-email" autocomplete="off" class="input" placeholder="Email">
                        <img class="email-icon" src="../assets/icons/mail.svg" alt="">
                    </div>

                    <div class="login-container">
                        <input type="password" id="signup-password" autocomplete="off" class="input" placeholder="Password">
                        <img class="email-icon" src="../assets/icons/lock.svg" alt="">
                    </div>

                    <div class="login-container">
                        <input type="password" id="signup-confirm" autocomplete="off" class="input" placeholder="Confirm Password">
                        <img class="email-icon" src="../assets/icons/lock.svg" alt="">
                    </div>

                    <div class="signup-policy-row">
                        <input type="checkbox" id="signup-policy" class="signup-checkbox">
                        <label for="signup-policy">
                            I accept the
                            <a href="privacy_policy.html" class="policy-link">Privacy Policy</a>
                        </label>
                    </div>

                    <div class="message-box" id="signup-message"></div>

                    <div class="login-buttons">
                        <button type="button" class="button-login" onclick="">Sign up</button>
                    </div>

                </div>
            </form>
        </div>

        <div class="policy">
            <a href="privacy_policy.html" class="privacy-policy">Privacy Policy</a>
            <a href="legal_notice.html" class="legal-notice">Legal notice</a>
        </div>
    </div>

    <script src="../script.js"></script>
</body>
</html>
