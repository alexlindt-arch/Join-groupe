<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../assets/icons/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon/favicon.svg" />
    <link rel="shortcut icon" href="../assets/icons/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/icons/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="../assets/icons/favicon/site.webmanifest" />
    <link rel="stylesheet" href="../style.css">
    <title>Summary</title>
</head>

<body class="app-page">
    <div data-import="../html/nav_template.html"></div>

    <div id="extern_panel" class="extern-panel d-none">
        <a href="../index.html" class="external-logo-link">
            <img src="../assets/img/logo_white.svg" alt="Join Logo" class="external-logo">
        </a>
        <a href="../index.html" class="extern-login-link">
            Log In
            <img src="../assets/icons/arrow-left-line.svg" alt="" class="external-login-arrow">
        </a>
        <div class="external-footer">
            <a href="privacy_policy.html" class="aktiv">Privacy Policy</a>
            <a href="legal_notice.html">Legal Notice</a>
        </div>
    </div>

    <div id="external_mobile_header" class="external-mobile-header d-none">
        <img src="../assets/img/logo_big.svg" alt="Join Logo">
    </div>

    <div id="external_mobile_bar" class="external-mobile-bar d-none">
        <a href="../index.html" class="external-mobile-login-link">
            <img src="../assets/icons/arrow-left-line.svg" alt="" class="external-login-arrow">
            Log In
        </a>
        <div class="external-mobile-links">
            <a href="privacy_policy.html" class="aktiv">Privacy Policy</a>
            <a href="legal_notice.html">Legal Notice</a>
        </div>
    </div>

    <div class="main-wrapper">

        <header class="main-header">
           <!--  <a href="summary.html" class="mobile-logo-link">
                <img src="../assets/img/logo_big.svg" alt="Join" class="mobile-header-logo">
            </a> -->
            <span class="header-title">Kanban Project Management Tool</span>
            <div class="header-actions">
                <a href="help.html" class="help-link">
                    <img src="../assets/icons/help.svg" alt="Help" class="help-icon">
                </a>
                <div class="avatar-wrapper" id="user-avatar-wrapper" onclick="toggleAvatarMenu()">
                    <div class="user-avatar" id="user-avatar"></div>
                    <div class="avatar-dropdown d-none" id="avatar-menu">
                        <button class="avatar-menu-btn"
                            onclick="window.location.href='help.html'; event.stopPropagation()">Help</button>
                        <button class="avatar-menu-btn"
                            onclick="window.location.href='privacy_policy.html'; event.stopPropagation()">Privacy
                            Policy</button>
                        <button class="avatar-menu-btn"
                            onclick="window.location.href='legal_notice.html'; event.stopPropagation()">Legal
                            Notice</button>
                        <button class="avatar-menu-btn" onclick="logout(); event.stopPropagation()">Log out</button>
                    </div>
                </div>
            </div>
        </header>

        <main class="summary-main">

            <div class="summary-left">
                <div class="summary-heading">
                    <h1 class="summary-title">Join 360</h1>
                    <div class="summary-heading-divider"></div>
                    <p class="summary-subtitle">Key Metrics at a Glance</p>
                </div>

                <div class="summary-cards">

                    <div class="cards-row">
                        <a class="stat-card" href="board.html">
                            <div class="stat-icon-circle">
                                <img src="../assets/icons/edit.svg" alt="" class="stat-icon">
                            </div>
                            <div class="stat-info">
                                <span class="stat-number" id="stat-todo">0</span>
                                <span class="stat-label">To-do</span>
                            </div>
                        </a>
                        <a class="stat-card" href="board.html">
                            <div class="stat-icon-circle">
                                <img src="../assets/icons/done.svg" alt="" class="stat-icon">
                            </div>
                            <div class="stat-info">
                                <span class="stat-number" id="stat-done">0</span>
                                <span class="stat-label">Done</span>
                            </div>
                        </a>
                    </div>

                    <a class="urgency-card" href="board.html">
                        <div class="urgency-left">
                            <div class="urgency-icon-circle">
                                <svg width="34" height="25" viewBox="0 0 34.186 25.1163" fill="none"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path
                                        d="M32.312 25.116C31.911 25.117 31.521 24.987 31.198 24.746L17.093 14.217L2.987 24.746C2.789 24.895 2.564 25.002 2.325 25.062C2.086 25.122 1.838 25.134 1.595 25.097C1.351 25.060 1.117 24.975 0.906 24.846C0.695 24.718 0.511 24.549 0.365 24.348C0.218 24.148 0.113 23.920 0.053 23.679C-0.006 23.437 -0.018 23.185 0.018 22.939C0.092 22.441 0.358 21.994 0.758 21.695L15.978 10.321C16.301 10.080 16.691 9.949 17.093 9.949C17.494 9.949 17.885 10.080 18.207 10.321L33.427 21.695C33.745 21.932 33.980 22.264 34.100 22.645C34.220 23.025 34.218 23.435 34.095 23.814C33.971 24.193 33.732 24.524 33.412 24.757C33.092 24.991 32.707 25.117 32.312 25.116Z"
                                        fill="white" />
                                    <path
                                        d="M32.312 15.164C31.911 15.165 31.521 15.035 31.198 14.795L17.093 4.265L2.987 14.795C2.587 15.095 2.086 15.221 1.595 15.145C1.103 15.070 0.660 14.801 0.365 14.396C0.069 13.992 -0.055 13.485 0.018 12.987C0.092 12.489 0.358 12.042 0.758 11.743L15.978 0.370C16.301 0.128 16.691 -0.002 17.093 -0.002C17.494 -0.002 17.885 0.128 18.207 0.370L33.427 11.743C33.745 11.980 33.980 12.312 34.100 12.693C34.220 13.073 34.218 13.483 34.095 13.862C33.971 14.241 33.732 14.572 33.412 14.805C33.092 15.039 32.707 15.165 32.312 15.164Z"
                                        fill="white" />
                                </svg>
                            </div>
                            <div class="urgency-info">
                                <span class="urgency-number" id="stat-urgent">0</span>
                                <span class="urgency-count-label">Urgent</span>
                            </div>
                        </div>
                        <div class="urgency-divider-vertical"></div>
                        <div class="urgency-right">
                            <span class="urgency-date" id="stat-deadline">No upcoming deadline</span>
                            <span class="urgency-date-label">Upcoming Deadline</span>
                        </div>
                    </a>

                    <div class="cards-row-sm">
                        <a class="stat-card-sm" href="board.html">
                            <span class="stat-number" id="stat-total">0</span>
                            <span class="stat-label">Tasks in Board</span>
                        </a>
                        <a class="stat-card-sm" href="board.html">
                            <span class="stat-number" id="stat-progress">0</span>
                            <span class="stat-label">Tasks In Progress</span>
                        </a>
                        <a class="stat-card-sm" href="board.html">
                            <span class="stat-number" id="stat-feedback">0</span>
                            <span class="stat-label">Awaiting Feedback</span>
                        </a>
                    </div>

                </div>
            </div>

            <div class="summary-right">
                <div class="greeting">
                    <span class="greeting-time" id="greeting-time">Good morning,</span>
                    <span class="greeting-name" id="greeting-name">Guest</span>
                </div>
            </div>

        </main>
    </div>

    <script src="../script.js"></script>
    <script src="../js/summary.js"></script>
</body>

</html>
