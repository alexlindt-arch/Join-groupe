<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../assets/icons/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon/favicon.svg" />
    <link rel="shortcut icon" href="../assets/icons/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/icons/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="../assets/icons/favicon/site.webmanifest" />
    <link rel="stylesheet" href="../assets/css/fonts.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../assets/css/shared.css">
    <link rel="stylesheet" href="../assets/css/board.css">
    <link rel="stylesheet" href="../assets/css/nav_template.css">
    <link rel="stylesheet" href="../assets/css/nav_responsive.css">
    
    <title>Board</title>
</head>

<body class="app-page" onload="init()">
    <div data-import="../html/nav_template.html"></div>

    <div id="extern_panel" class="extern-panel d-none">
        <a href="../index.html" class="external-logo-link">
            <img src="../assets/img/logo_white.svg" alt="Join Logo" class="external-logo">
        </a>
        <a href="../index.html" class="extern-login-link">
            Log In
            <img src="../assets/icons/arrow-left-line.svg" alt="" class="external-login-arrow">
        </a>
        <div class="external-footer">
            <a href="privacy_policy.html" class="aktiv">Privacy Policy</a>
            <a href="legal_notice.html">Legal Notice</a>
        </div>
    </div>

    <div id="external_mobile_header" class="external-mobile-header d-none">
        <img src="../assets/img/logo_big.svg" alt="Join Logo">
    </div>

    <div id="external_mobile_bar" class="external-mobile-bar d-none">
        <a href="../index.html" class="external-mobile-login-link">
            <img src="../assets/icons/arrow-left-line.svg" alt="" class="external-login-arrow">
            Log In
        </a>
        <div class="external-mobile-links">
            <a href="privacy_policy.html" class="aktiv">Privacy Policy</a>
            <a href="legal_notice.html">Legal Notice</a>
        </div>
    </div>

    <div class="main-wrapper">

        <header class="main-header">
            <a href="summary.html" class="mobile-logo-link">
                <img src="../assets/img/logo_big.svg" alt="Join" class="mobile-header-logo">
            </a>
            <span class="header-title">Kanban Project Management Tool</span>
            <div class="header-actions">
                <a href="help.html" class="help-link">
                    <img src="../assets/icons/help.svg" alt="Help" class="help-icon">
                </a>
                <div class="avatar-wrapper" id="user-avatar-wrapper" onclick="toggleAvatarMenu()">
                    <div class="user-avatar" id="user-avatar"></div>
                    <div class="avatar-dropdown d-none" id="avatar-menu">
                        <button class="avatar-menu-btn"
                            onclick="window.location.href='help.html'; event.stopPropagation()">Help</button>
                        <button class="avatar-menu-btn"
                            onclick="window.location.href='privacy_policy.html'; event.stopPropagation()">Privacy
                            Policy</button>
                        <button class="avatar-menu-btn"
                            onclick="window.location.href='legal_notice.html'; event.stopPropagation()">Legal
                            Notice</button>
                        <button class="avatar-menu-btn" onclick="logout(); event.stopPropagation()">Log out</button>
                    </div>
                </div>
            </div>
        </header>

        <main class="board-main">
            <div class="board-header">
                <h1 class="page-title">Board</h1>
                <div class="board-controls">
                    <div class="search-wrapper">
                        <input class="search-input" type="text" placeholder="Find Task" oninput="">
                        <div class="search-divider"></div>
                        <button class="search-icon-btn" aria-label="Suchen">
                            <svg width="22" height="22" viewBox="0 0 32 32" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M20.5 18.5H19.71L19.43 18.23C20.63 16.83 21.25 14.92 20.88 12.89C20.37 10.11 18.06 7.89 15.27 7.49C11.01 6.9 7.39 10.51 7.99 14.77C8.39 17.56 10.61 19.87 13.39 20.38C15.42 20.75 17.33 20.13 18.73 18.93L19 19.21V20L23.25 24.25C23.66 24.66 24.33 24.66 24.74 24.25C25.15 23.84 25.15 23.17 24.74 22.76L20.5 18.5ZM14.5 18.5C12.01 18.5 10 16.49 10 14C10 11.51 12.01 9.5 14.5 9.5C16.99 9.5 19 11.51 19 14C19 16.49 16.99 18.5 14.5 18.5Z"
                                    fill="#2A3647" />
                            </svg>
                        </button>
                    </div>
                    <a href="add_task.html" class="btn-add-task">
                        Add task
                        <svg class="btn-add-task-icon" width="20" height="20" viewBox="0 0 20 20" fill="none"
                            xmlns="http://www.w3.org/2000/svg">
                            <path d="M10 1V19" stroke="white" stroke-width="2" stroke-linecap="round" />
                            <path d="M1 10H19" stroke="white" stroke-width="2" stroke-linecap="round" />
                        </svg>
                    </a>
                </div>
            </div>

            <div class="board-columns">
                <div class="board-col">
                    <div class="board-col-header">
                        <span>To do</span>
                        <a href="add_task.html" class="col-add-btn" aria-label="Task hinzufügen">
                            <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                                <path d="M7.5 1V14" stroke="#2A3647" stroke-width="2" stroke-linecap="round" />
                                <path d="M1 7.5H14" stroke="#2A3647" stroke-width="2" stroke-linecap="round" />
                            </svg>
                        </a>
                    </div>
                    <div class="board-cards" id="todo-col">
                        <div class="board-empty">No tasks To do</div>
                    </div>
                </div>

                <div class="board-col">
                    <div class="board-col-header">
                        <span>In progress</span>
                        <a href="add_task.html" class="col-add-btn" aria-label="Task hinzufügen">
                            <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                                <path d="M7.5 1V14" stroke="#2A3647" stroke-width="2" stroke-linecap="round" />
                                <path d="M1 7.5H14" stroke="#2A3647" stroke-width="2" stroke-linecap="round" />
                            </svg>
                        </a>
                    </div>
                    <div class="board-cards" id="inprogress-col">
                        <div class="board-empty">No tasks In progress</div>
                    </div>
                </div>

                <div class="board-col">
                    <div class="board-col-header">
                        <span>Await feedback</span>
                        <a href="add_task.html" class="col-add-btn" aria-label="Task hinzufügen">
                            <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                                <path d="M7.5 1V14" stroke="#2A3647" stroke-width="2" stroke-linecap="round" />
                                <path d="M1 7.5H14" stroke="#2A3647" stroke-width="2" stroke-linecap="round" />
                            </svg>
                        </a>
                    </div>
                    <div class="board-cards" id="feedback-col">
                        <div class="board-empty">No tasks Awaiting feedback</div>
                    </div>
                </div>

                <div class="board-col">
                    <div class="board-col-header">
                        <span>Done</span>
                    </div>
                    <div class="board-cards" id="done-col">
                        <div class="board-empty">No tasks Done</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/board.js"></script>
    <script src="../script.js"></script>
</body>

</html>
