<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../assets/icons/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon/favicon.svg" />
    <link rel="shortcut icon" href="../assets/icons/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/icons/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="../assets/icons/favicon/site.webmanifest" />
    <link rel="stylesheet" href="../style.css">
    <title>Board</title>
</head>

<body onload="init(); initTasks();">
    <div data-import="../html/nav_template.html"></div>
    <main class="board-main">
        <div class="board-header">
            <h1 class="page-title">Board</h1>
            <div class="board-controls">
                <div class="search-wrapper">
                    <input class="search-input" type="text" id="board-search" placeholder="Find Task"
                        oninput="filterTasks()">
                    <div class="search-divider"></div>
                    <button class="search-icon-btn" aria-label="Suchen">
                        <svg width="22" height="22" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M20.5 18.5H19.71L19.43 18.23C20.63 16.83 21.25 14.92 20.88 12.89C20.37 10.11 18.06 7.89 15.27 7.49C11.01 6.9 7.39 10.51 7.99 14.77C8.39 17.56 10.61 19.87 13.39 20.38C15.42 20.75 17.33 20.13 18.73 18.93L19 19.21V20L23.25 24.25C23.66 24.66 24.33 24.66 24.74 24.25C25.15 23.84 25.15 23.17 24.74 22.76L20.5 18.5ZM14.5 18.5C12.01 18.5 10 16.49 10 14C10 11.51 12.01 9.5 14.5 9.5C16.99 9.5 19 11.51 19 14C19 16.49 16.99 18.5 14.5 18.5Z"
                                fill="#2A3647" />
                        </svg>
                    </button>
                </div>
                <button class="btn-add-task" onclick="openAddTaskModal()">
                    Add task
                    <svg class="btn-add-task-icon" width="20" height="20" viewBox="0 0 20 20" fill="none"
                        xmlns="http://www.w3.org/2000/svg">
                        <path d="M10 1V19" stroke="white" stroke-width="2" stroke-linecap="round" />
                        <path d="M1 10H19" stroke="white" stroke-width="2" stroke-linecap="round" />
                    </svg>
                </button>
            </div>
        </div>

        <div class="board-columns">
            <div class="board-col">
                <div class="board-col-header">
                    <span>To do</span>
                    <button class="col-add-btn" aria-label="Task hinzufügen" onclick="openAddTaskModal('todo')">
                        <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                            <path d="M7.5 1V14" stroke="#2A3647" stroke-width="2" stroke-linecap="round" />
                            <path d="M1 7.5H14" stroke="#2A3647" stroke-width="2" stroke-linecap="round" />
                        </svg>
                    </button>
                </div>
                <div class="board-cards" id="todo" ondrop="moveTo('todo')"
                    ondragover="allowDrop(event); highlight('todo')" ondragleave="removeHighlight('todo')">
                </div>
            </div>

            <div class="board-col">
                <div class="board-col-header">
                    <span>In progress</span>
                    <button class="col-add-btn" aria-label="Task hinzufügen" onclick="openAddTaskModal('inProgress')">
                        <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                            <path d="M7.5 1V14" stroke="#2A3647" stroke-width="2" stroke-linecap="round" />
                            <path d="M1 7.5H14" stroke="#2A3647" stroke-width="2" stroke-linecap="round" />
                        </svg>
                    </button>
                </div>
                <div class="board-cards" id="inProgress" ondrop="moveTo('inProgress')"
                    ondragover="allowDrop(event); highlight('inProgress')" ondragleave="removeHighlight('inProgress')">
                </div>
            </div>

            <div class="board-col">
                <div class="board-col-header">
                    <span>Await feedback</span>
                    <button class="col-add-btn" aria-label="Task hinzufügen" onclick="openAddTaskModal('awaitFeedback')">
                        <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                            <path d="M7.5 1V14" stroke="#2A3647" stroke-width="2" stroke-linecap="round" />
                            <path d="M1 7.5H14" stroke="#2A3647" stroke-width="2" stroke-linecap="round" />
                        </svg>
                    </button>
                </div>
                <div class="board-cards" id="awaitFeedback" ondrop="moveTo('awaitFeedback')"
                    ondragover="allowDrop(event); highlight('awaitFeedback')"
                    ondragleave="removeHighlight('awaitFeedback')">
                </div>
            </div>

            <div class="board-col">
                <div class="board-col-header">
                    <span>Done</span>
                </div>
                <div class="board-cards" id="done" ondrop="moveTo('done')"
                    ondragover="allowDrop(event); highlight('done')" ondragleave="removeHighlight('done')">
                </div>
            </div>
        </div>
    </main>

    <!-- Task Detail / Edit Overlay -->
    <div class="board-overlay d-none" id="board-overlay" onclick="handleOverlayClick(event)">
        <div class="board-modal" onclick="event.stopPropagation()">
            <div id="board-detail-box"></div>
            <div id="board-edit-box" class="d-none"></div>
        </div>
    </div>

    <!-- Add Task Modal -->
    <div class="board-overlay d-none" id="add-task-overlay" onclick="closeAddTaskModal(event)">
        <div class="add-task-modal" onclick="event.stopPropagation()">
            <button class="modal-close-btn" onclick="closeAddTaskModal()">&times;</button>
            <h2 class="modal-title">Add Task</h2>
            
            <form class="task-form" id="modal-task-form" onsubmit="createTaskFromModal(event)">
                <div class="form-columns">
                    <div class="form-col">
                        <div class="form-group">
                            <label class="form-label" for="modal-task-title">Title <span class="required">*</span></label>
                            <input class="form-input" type="text" id="modal-task-title" placeholder="Enter a title"
                                oninput="updateModalCreateButton()">
                            <span class="field-error d-none" id="modal-error-title">This field is required</span>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="modal-task-desc">Description</label>
                            <textarea class="form-input form-textarea" id="modal-task-desc"
                                placeholder="Enter a description"></textarea>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="modal-task-due">Due date <span class="required">*</span></label>
                            <div class="form-input-icon">
                                <input class="form-input" type="date" id="modal-task-due" onchange="updateModalCreateButton()"
                                    oninput="updateModalCreateButton()">
                            </div>
                            <span class="field-error d-none" id="modal-error-due">This field is required</span>
                        </div>
                    </div>

                    <div class="form-divider-vertical"></div>

                    <div class="form-col">
                        <div class="form-group">
                            <label class="form-label">Priority</label>
                            <div class="prio-buttons">
                                <button type="button" class="prio-btn prio-urgent" data-prio="urgent"
                                    onclick="setModalPriority(this)">
                                    Urgent
                                    <svg width="20" height="15" viewBox="0 0 20 14.51" fill="none">
                                        <path d="M0 8.76 L10 0 L20 8.76 L17.5 8.76 L10 2.5 L2.5 8.76 Z" />
                                        <path d="M0 14.51 L10 5.75 L20 14.51 L17.5 14.51 L10 8.25 L2.5 14.51 Z" />
                                    </svg>
                                </button>
                                <button type="button" class="prio-btn prio-medium prio-active" data-prio="medium"
                                    onclick="setModalPriority(this)">
                                    Medium
                                    <svg width="20" height="8" viewBox="0 0 20 8" fill="none">
                                        <rect x="0" y="0" width="20" height="2.21" rx="1.1" />
                                        <rect x="0" y="5.24" width="20" height="2.21" rx="1.1" />
                                    </svg>
                                </button>
                                <button type="button" class="prio-btn prio-low" data-prio="low"
                                    onclick="setModalPriority(this)">
                                    Low
                                    <svg width="20" height="15" viewBox="0 0 20 14.51" fill="none">
                                        <path d="M0 0 L10 8.76 L20 0 L17.5 0 L10 6.26 L2.5 0 Z" />
                                        <path d="M0 5.75 L10 14.51 L20 5.75 L17.5 5.75 L10 12.01 L2.5 5.75 Z" />
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Assigned to</label>
                            <div class="custom-select" id="modal-assign-select">
                                <div class="form-input select-toggle" id="modal-assign-toggle"
                                    onclick="toggleModalAssignDropdown()">
                                    <span>Select contacts to assign</span>
                                    <span class="select-caret">&#9662;</span>
                                </div>
                                <div class="select-options d-none" id="modal-assign-options"></div>
                            </div>
                            <div class="assigned-avatars" id="modal-assigned-avatars"></div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Category <span class="required">*</span></label>
                            <div class="custom-select" id="modal-category-select">
                                <div class="form-input select-toggle" id="modal-category-toggle"
                                    onclick="toggleModalCategoryDropdown()">
                                    <span id="modal-category-selected" class="select-placeholder">Select task category</span>
                                    <span class="select-caret">&#9662;</span>
                                </div>
                                <div class="select-options d-none" id="modal-category-options">
                                    <div class="select-option" onclick="selectModalCategory('Technical Task')">Technical Task
                                    </div>
                                    <div class="select-option" onclick="selectModalCategory('User Story')">User Story</div>
                                </div>
                            </div>
                            <span class="field-error d-none" id="modal-error-category">This field is required</span>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="modal-task-subtask">Subtasks</label>
                            <div class="subtask-input-wrapper">
                                <input class="form-input" type="text" id="modal-task-subtask" placeholder="Add new subtask"
                                    oninput="updateModalSubtaskActions()" onkeydown="handleModalSubtaskKey(event)">
                                <div class="subtask-actions">
                                    <span class="subtask-edit-actions d-none" id="modal-subtask-edit-actions">
                                        <button type="button" class="subtask-icon-btn" title="Clear"
                                            onclick="clearModalSubtaskInput()">&#10005;</button>
                                        <span class="subtask-action-divider"></span>
                                        <button type="button" class="subtask-icon-btn" title="Add"
                                            onclick="addModalSubtask()">&#10003;</button>
                                    </span>
                                </div>
                            </div>
                            <ul class="subtask-list" id="modal-subtask-list"></ul>
                        </div>
                    </div>
                </div>

                <div class="form-footer">
                    <span class="required-hint"><span class="required">*</span>This field is required</span>
                    <div class="form-actions">
                        <button type="button" class="btn-clear" onclick="clearModalTaskForm()">Clear <span
                                class="btn-x">✕</span></button>
                        <button type="submit" class="btn-create" id="modal-btn-create" disabled>
                            Create Task
                            <img src="../assets/icons/done.svg" alt="" class="btn-icon">
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div id="notification" class="notification d-none"></div>
    <script src="../assets/templates/board_template.js"></script>
    <script src="../assets/templates/add_task_template.js"></script>
    <script src="../js/add_task_assign.js"></script>
    <script src="../js/board_drag.js"></script>
    <script src="../js/add_task_board.js"></script>
    <script src="../js/board.js"></script>
    <script src="../script.js"></script>
</body>

</html>
